name: Trigger auto deployment for pdf-service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry legalintelacr \
            --image pdf-service:${{ github.sha }} \
            --image pdf-service:latest \
            .

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name pdf-service \
            --resource-group legal-intel-rg \
            --image legalintelacr.azurecr.io/pdf-service:${{ github.sha }}
